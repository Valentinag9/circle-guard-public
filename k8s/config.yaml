apiVersion: v1
kind: ConfigMap
metadata:
  name: circleguard-config
data:
  SPRING_PROFILES_ACTIVE: docker
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  POSTGRES_HOST: postgres
  NEO4J_URI: bolt://neo4j:7687
  AUTH_SERVICE_URL: http://circleguard-auth-service:8180
---
apiVersion: v1
kind: Secret
metadata:
  name: circleguard-secret
type: Opaque
data:
  # Base64 encoded values for "password" and other dummy secrets
  POSTGRES_PASSWORD: cGFzc3dvcmQ= # password
  NEO4J_PASSWORD: cGFzc3dvcmQ= # password
  JWT_SECRET: bXktc2VjcmV0LWtleS1mb3Itand0LXdoZW4tdGVzdGluZy1sb2NhbGx5 # my-secret-key-for-jwt-when-testing-locally
  QR_SECRET: bXktc2VjcmV0LWtleS1mb3ItcXItd2hlbi10ZXN0aW5nLWxvY2FsbHk= # my-secret-key-for-qr-when-testing-locally
