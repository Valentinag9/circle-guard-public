# Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-auth-service
spec:
  selector:
    matchLabels:
      app: circleguard-auth-service
  template:
    metadata:
      labels:
        app: circleguard-auth-service
    spec:
      containers:
      - name: auth
        image: circleguard-auth-service:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8180
        envFrom:
        - configMapRef:
            name: circleguard-config
        - secretRef:
            name: circleguard-secret
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-auth-service
spec:
  selector:
    app: circleguard-auth-service
  ports:
  - port: 8180
---
