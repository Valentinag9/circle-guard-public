# ═══════════════════════════════════════════════════════════════════════════
#  auth-service — MASTER Deployment & Service
#  Diferencias vs STAGE: replicas=3, HPA listo, recursos máximos
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: circleguard-master
  labels:
    app: auth-service
    env: master
    version: "1.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        env: master
    spec:
      containers:
      - name: auth-service
        image: circleguard/auth-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8180
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-svc.circleguard-master.svc.cluster.local:5432/circleguard_auth"
        - name: SPRING_DATASOURCE_USERNAME
          value: "admin"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: POSTGRES_PASSWORD
        - name: SPRING_LDAP_URLS
          value: "ldap://openldap-svc.circleguard-master.svc.cluster.local:389"
        - name: SPRING_LDAP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: LDAP_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: JWT_SECRET
        - name: QR_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: QR_SECRET
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8180
          initialDelaySeconds: 40
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8180
          initialDelaySeconds: 60
          periodSeconds: 20
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service-svc
  namespace: circleguard-master
spec:
  selector:
    app: auth-service
  ports:
  - name: http
    port: 8180
    targetPort: 8180
    nodePort: 32180
  type: NodePort
