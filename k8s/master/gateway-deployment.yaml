---
# gateway-service — MASTER (3 replicas, RollingUpdate)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: circleguard-master
  labels: {app: gateway-service, env: master}
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 1, maxSurge: 1}
  selector:
    matchLabels: {app: gateway-service}
  template:
    metadata:
      labels: {app: gateway-service, env: master}
    spec:
      containers:
      - name: gateway-service
        image: circleguard/gateway-service:latest
        imagePullPolicy: Never
        ports: [{containerPort: 8087}]
        env:
        - {name: SPRING_DATA_REDIS_HOST, value: "redis-svc.circleguard-master.svc.cluster.local"}
        - {name: SPRING_DATA_REDIS_PORT, value: "6379"}
        - name: JWT_SECRET
          valueFrom: {secretKeyRef: {name: circleguard-secrets, key: JWT_SECRET}}
        - name: QR_SECRET
          valueFrom: {secretKeyRef: {name: circleguard-secrets, key: QR_SECRET}}
        readinessProbe:
          httpGet: {path: /actuator/health, port: 8087}
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests: {memory: "256Mi", cpu: "300m"}
          limits: {memory: "512Mi", cpu: "600m"}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service-svc
  namespace: circleguard-master
spec:
  selector: {app: gateway-service}
  ports: [{port: 8087, targetPort: 8087, nodePort: 32087}]
  type: NodePort
