# ═══════════════════════════════════════════════════════════════════════════
#  dashboard-service — PROD Deployment & Service
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: circleguard-prod
  labels:
    app: dashboard-service
    env: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
        env: prod
    spec:
      containers:
      - name: dashboard-service
        image: circleguard/dashboard-service:latest
        ports:
        - containerPort: 8084
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service-svc
  namespace: circleguard-prod
spec:
  selector:
    app: dashboard-service
  ports:
  - name: http
    port: 8084
    targetPort: 8084
  type: ClusterIP
