# ═══════════════════════════════════════════════════════════════════════════
#  auth-service — STAGE Deployment & Service
#  Diferencias vs DEV: replicas=2, recursos aumentados, NodePort distinto
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: circleguard-stage
  labels:
    app: auth-service
    env: stage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        env: stage
    spec:
      containers:
      - name: auth-service
        image: circleguard/auth-service:stage-latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8180
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-svc.circleguard-stage.svc.cluster.local:5432/circleguard_auth"
        - name: SPRING_DATASOURCE_USERNAME
          value: "admin"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: POSTGRES_PASSWORD
        - name: SPRING_LDAP_URLS
          value: "ldap://openldap-svc.circleguard-stage.svc.cluster.local:389"
        - name: SPRING_LDAP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: LDAP_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: JWT_SECRET
        - name: QR_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: QR_SECRET
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8180
          initialDelaySeconds: 40
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8180
          initialDelaySeconds: 60
          periodSeconds: 20
        resources:
          requests:
            memory: "384Mi"
            cpu: "300m"
          limits:
            memory: "768Mi"
            cpu: "700m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service-svc
  namespace: circleguard-stage
spec:
  selector:
    app: auth-service
  ports:
  - name: http
    port: 8180
    targetPort: 8180
    nodePort: 31180
  type: NodePort
