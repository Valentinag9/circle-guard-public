# ═══════════════════════════════════════════════════════════════════════════
#  dashboard-service — STAGE Deployment & Service
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: circleguard-stage
  labels:
    app: dashboard-service
    env: stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
        env: stage
    spec:
      containers:
      - name: dashboard-service
        image: circleguard/dashboard-service:stage-latest
        ports:
        - containerPort: 8084
        env:
        - name: AUTH_API_URL
          value: "http://auth-service-svc.circleguard-stage.svc.cluster.local:8180"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service-svc
  namespace: circleguard-stage
spec:
  selector:
    app: dashboard-service
  ports:
  - name: http
    port: 8084
    targetPort: 8084
  type: ClusterIP
