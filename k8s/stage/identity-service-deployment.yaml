apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-identity-service
  namespace: stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
      - name: identity-service
        image: circleguard-registry/circleguard-identity-service:stage
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: stage
spec:
  selector:
    app: identity-service
  ports:
  - port: 80
    targetPort: 8080

