# ═══════════════════════════════════════════════════════════════════════════
#  gateway-service — DEV Deployment & Service
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: circleguard-dev
  labels:
    app: gateway-service
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
        env: dev
    spec:
      containers:
      - name: gateway-service
        image: circleguard/gateway-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8087
        env:
        - name: SPRING_DATA_REDIS_HOST
          value: "redis-svc.circleguard-dev.svc.cluster.local"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: JWT_SECRET
        - name: QR_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: QR_SECRET
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8087
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8087
          initialDelaySeconds: 50
          periodSeconds: 20
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service-svc
  namespace: circleguard-dev
spec:
  selector:
    app: gateway-service
  ports:
  - name: http
    port: 8087
    targetPort: 8087
    nodePort: 30087
  type: NodePort
