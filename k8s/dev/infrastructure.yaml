# ═══════════════════════════════════════════════════════════════════════════
#  CircleGuard — DEV Infrastructure (DB User Fix)
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-auth
  namespace: circleguard-dev
spec:
  selector:
    matchLabels:
      app: postgres-auth
  template:
    metadata:
      labels:
        app: postgres-auth
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_DB
          value: "circleguard_auth"
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          value: "password"
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: circleguard-dev
spec:
  selector:
    app: postgres-auth
  ports:
  - port: 5432
    targetPort: 5432
---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: circleguard-dev
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: circleguard-dev
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
# LDAP
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openldap
  namespace: circleguard-dev
spec:
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
    spec:
      containers:
      - name: openldap
        image: osixia/openldap:1.5.0
        env:
        - name: LDAP_ORGANISATION
          value: "CircleGuard"
        - name: LDAP_DOMAIN
          value: "circleguard.edu"
        - name: LDAP_ADMIN_PASSWORD
          value: "admin"
        ports:
        - containerPort: 389
---
apiVersion: v1
kind: Service
metadata:
  name: openldap-svc
  namespace: circleguard-dev
spec:
  selector:
    app: openldap
  ports:
  - port: 389
    targetPort: 389
