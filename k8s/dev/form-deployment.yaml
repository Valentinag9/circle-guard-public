# ═══════════════════════════════════════════════════════════════════════════
#  form-service — DEV Deployment & Service
# ═══════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: form-service
  namespace: circleguard-dev
  labels:
    app: form-service
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: form-service
  template:
    metadata:
      labels:
        app: form-service
        env: dev
    spec:
      containers:
      - name: form-service
        image: circleguard/form-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8086
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-svc.circleguard-dev.svc.cluster.local:5432/circleguard_form"
        - name: SPRING_DATASOURCE_USERNAME
          value: "admin"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: POSTGRES_PASSWORD
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-svc.circleguard-dev.svc.cluster.local:9092"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: circleguard-secrets
              key: JWT_SECRET
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8086
          initialDelaySeconds: 40
          periodSeconds: 10
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8086
          initialDelaySeconds: 60
          periodSeconds: 20
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: form-service-svc
  namespace: circleguard-dev
spec:
  selector:
    app: form-service
  ports:
  - name: http
    port: 8086
    targetPort: 8086
    nodePort: 30086
  type: NodePort
