apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-notification-service
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: circleguard-registry/circleguard-notification-service:prod
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: prod
spec:
  selector:
    app: notification-service
  ports:
  - port: 80
    targetPort: 8080

